name: Deploy browser version

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Compile and test
        run: |
          mkdir -p build/classes build/test-classes build/site
          javac --release 8 -encoding UTF-8 -d build/classes src/*.java
          javac --release 8 -encoding UTF-8 -d build/test-classes src/*.java test/*.java
          java -ea -cp build/test-classes PassengerQueueTest
          java -ea -cp build/test-classes SimulationEngineTest

      - name: Package browser application
        run: |
          jar --create --file build/site/terminal-simulation.jar \
              --main-class TerminalSimulation -C build/classes .
          cp -R web/. build/site/
          touch build/site/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: build/site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
